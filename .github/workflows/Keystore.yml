name: Generate Keystore and Output Base64 

on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate upload-keystore.jks using secrets
        run: |
          keytool -genkey -noprompt \
            -keystore upload-keystore.jks \
            -alias upload \
            -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_KEY_PASSWORD }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CI, OU=AutoGen, O=Test, L=XX, ST=XX, C=US"

      - name: Verify keystore
        run: keytool -list -v -keystore upload-keystore.jks -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD }}"

      # 👇 关键步骤：输出 Base64（仅限私有仓库！）
      - name: Output Base64 of upload-keystore.jks
        run: |
          echo "::group::Base64 Encoded Keystore (DO NOT SHARE)"
          base64 -w 0 upload-keystore.jks
          echo ""
          echo "::endgroup::"
